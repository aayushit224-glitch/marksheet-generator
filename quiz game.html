<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .quiz-container {
      background: #fff;
      border: 2px solid #333;
      padding: 20px;
      width: 600px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-align: center;
    }
    h2 {
      color: #2c3e50;
    }
    .question {
      font-size: 18px;
      margin: 20px 0;
    }
    .options button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .options button:hover {
      background: #2980b9;
    }
    .timer {
      font-size: 16px;
      margin-top: 15px;
      color: #e74c3c;
      font-weight: bold;
    }
    .score {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>🎮 Quiz Game</h2>
    <div id="quiz-content">
      <p class="question" id="question"></p>
      <div class="options" id="options"></div>
      <p class="timer" id="timer"></p>
      <p class="score" id="score"></p>
    </div>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>

  <script>
    // Quiz questions stored in an array
    const questions = [
      { q: "What is the capital of India?", options: ["Delhi", "Mumbai", "Jaipur", "Kolkata"], answer: "Delhi" },
      { q: "Which language runs in a web browser?", options: ["Java", "C", "Python", "JavaScript"], answer: "JavaScript" },
      { q: "What does CSS stand for?", options: ["Cascading Style Sheets", "Computer Style System", "Creative Style Syntax", "Colorful Style Sheets"], answer: "Cascading Style Sheets" },
      { q: "Which company developed Windows OS?", options: ["Apple", "Microsoft", "Google", "IBM"], answer: "Microsoft" },
      { q: "What is 5 + 7?", options: ["10", "11", "12", "13"], answer: "12" }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer;
    let timeLeft = 10;

    // Start quiz
    function startQuiz() {
      currentQuestion = 0;
      score = 0;
      document.getElementById("score").textContent = "";
      showQuestion();
    }

    // Show question
    function showQuestion() {
      if (currentQuestion >= questions.length) {
        document.getElementById("question").textContent = "Quiz Over!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("timer").textContent = "";
        document.getElementById("score").textContent = "Final Score: " + score + "/" + questions.length;
        return;
      }

      const qObj = questions[currentQuestion];
      document.getElementById("question").textContent = qObj.q;

      // Shuffle options using Math.random()
      const shuffledOptions = qObj.options.sort(() => Math.random() - 0.5);

      let optionsHTML = "";
      shuffledOptions.forEach(opt => {
        optionsHTML += `<button onclick="checkAnswer('${opt}')">${opt}</button>`;
      });
      document.getElementById("options").innerHTML = optionsHTML;

      // Reset and start timer
      timeLeft = 10;
      document.getElementById("timer").textContent = "Time Left: " + timeLeft + "s";
      clearInterval(timer);
      timer = setInterval(updateTimer, 1000);
    }

    // Timer countdown
    function updateTimer() {
      timeLeft--;
      document.getElementById("timer").textContent = "Time Left: " + timeLeft + "s";
      if (timeLeft <= 0) {
        clearInterval(timer);
        currentQuestion++;
        showQuestion();
      }
    }

    // Check answer
    function checkAnswer(selected) {
      clearInterval(timer);
      if (selected === questions[currentQuestion].answer) {
        score++;
      }
      currentQuestion++;
      showQuestion();
    }
  </script>
</body>
</html>
