<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marksheet Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .marksheet-container {
      background: #fff;
      border: 2px solid #333;
      padding: 20px;
      width: 700px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }
    input {
      width: 100%;
      padding: 6px;
      margin: 5px 0 15px;
      border: 1px solid #aaa;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #2980b9;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #3498db;
      color: white;
    }
    .summary {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="marksheet-container">
    <h2>📘 Student Marksheet</h2>
    <!-- Student Details Form -->
    <label for="name">Student Name:</label>
    <input type="text" id="name" placeholder="Enter student name">

    <label for="roll">Roll Number:</label>
    <input type="text" id="roll" placeholder="Enter roll number">

    <label>Marks (out of 100):</label>
    <input type="number" id="sub1" placeholder="Subject 1">
    <input type="number" id="sub2" placeholder="Subject 2">
    <input type="number" id="sub3" placeholder="Subject 3">
    <input type="number" id="sub4" placeholder="Subject 4">
    <input type="number" id="sub5" placeholder="Subject 5">

    <button onclick="generateMarksheet()">Generate Marksheet</button>

    <div id="marksheet-output"></div>
  </div>

  <script>
    // Timetable stored as 2-D Array
    const timetable = [
      ["Day", "9-10 AM", "10-11 AM", "11-12 PM", "12-1 PM"],
      ["Monday", "Math", "English", "Science", "Computer"],
      ["Tuesday", "Science", "Math", "English", "Computer"],
      ["Wednesday", "English", "Science", "Math", "Computer"],
      ["Thursday", "Computer", "Math", "Science", "English"],
      ["Friday", "Math", "Computer", "Science", "English"]
    ];

    // Function to calculate grade
    function getGrade(percentage) {
      if (percentage >= 90) return "A+";
      else if (percentage >= 80) return "A";
      else if (percentage >= 70) return "B";
      else if (percentage >= 60) return "C";
      else if (percentage >= 50) return "D";
      else return "Fail";
    }

    // Function to generate marksheet
    function generateMarksheet() {
      const name = document.getElementById("name").value;
      const roll = document.getElementById("roll").value;

      const marks = [
        parseInt(document.getElementById("sub1").value) || 0,
        parseInt(document.getElementById("sub2").value) || 0,
        parseInt(document.getElementById("sub3").value) || 0,
        parseInt(document.getElementById("sub4").value) || 0,
        parseInt(document.getElementById("sub5").value) || 0
      ];

      const total = marks.reduce((a, b) => a + b, 0);
      const percentage = (total / 500) * 100;
      const grade = getGrade(percentage);

      // Build timetable table
      let timetableHTML = "<h3>📅 Weekly Timetable</h3><table>";
      timetable.forEach(row => {
        timetableHTML += "<tr>";
        row.forEach(cell => {
          timetableHTML += `<td>${cell}</td>`;
        });
        timetableHTML += "</tr>";
      });
      timetableHTML += "</table>";

      // Display marksheet
      document.getElementById("marksheet-output").innerHTML = `
        <h3>🎓 Student Details</h3>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Roll Number:</strong> ${roll}</p>
        <p><strong>Total Marks:</strong> ${total} / 500</p>
        <p><strong>Percentage:</strong> ${percentage.toFixed(2)}%</p>
        <p><strong>Grade:</strong> ${grade}</p>
        ${timetableHTML}
      `;
    }
  </script>
</body>
</html>
